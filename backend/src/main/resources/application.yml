spring:
  datasource:
    internet:
      url: jdbc:h2:mem:internet_db;DB_CLOSE_DELAY=-1
      username: sa
      password:
      driver-class-name: org.h2.Driver
    intranet:
      url: jdbc:h2:mem:intranet_db;DB_CLOSE_DELAY=-1
      username: sa
      password:
      driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
server:
  port: 8080

app:
  sync:
    interval-ms: 300000 # 5 minutes
  autoclose:
    interval-ms: 86400000 # 1 day
    threshold-minutes: 10080 # 7 days
